---

is_debug: true
time_zone: Europe/Madrid
accept_unknown_tag: false
accept_unknown_chp: false
# seconds; re-asserted on each BootNotification so a charger that reboots with sampling
# reset to 0 keeps reporting meter values. 0 disables the push.
meter_value_sample_interval: 60
# Measurands unioned into each charger's MeterValuesSampledData on boot, so the electrical
# readings the diagnostics rely on are actually reported. A charger's default sample list is
# often just the energy register, so voltage and current never arrive unless asked for. The
# charger's own extra measurands are preserved; empty leaves its configuration untouched.
meter_values_measurands:
  - Voltage
  - Current.Import
  - Current.Offered
listen:
  type: port
  bind_ip: 0.0.0.0
  port: 5000
  tls_enabled: true
  cert_file: c:/cert/cert.pem
  key_file: c:/cert/key.pem
api:
  bind_ip: 0.0.0.0
  port: 5001
  tls_enabled: true
  cert_file: c:/cert/cert.pem
  key_file: c:/cert/key.pem
metrics:
  enabled: false
  bind_ip: 127.0.0.1
  port: 5003
mongo:
  enabled: false
  host: 127.0.0.1
  port: 27017
  user: admin
  password: pass
  database: evsys
ocpi:
  enabled: false
  url: 127.0.0.1:5002
  token: OCPI_TOKEN
telegram:
  enabled: false
  telegram_api_key: YOUR_TELEGRAM_API_KEY